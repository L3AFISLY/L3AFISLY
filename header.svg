<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0a3d3d"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#0a3d3d"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="#000000"/>

  <!-- Venom blobs -->
  <ellipse cx="420" cy="100" rx="160" ry="90" fill="url(#blob1)" filter="url(#blur1)" opacity="0.9"/>
  <ellipse cx="500" cy="130" rx="120" ry="70" fill="url(#blob2)" filter="url(#blur2)" opacity="0.8"/>

  <!-- LEAFISLY with gray stroke -->
  <text
    x="450" y="108"
    font-family="Helvetica, Arial, sans-serif"
    font-size="72"
    font-weight="bold"
    text-anchor="middle"
    fill="white"
    stroke="#888888"
    stroke-width="2"
    paint-order="stroke"
  >LEAFISLY</text>

  <!-- Artist / Musician with gray stroke -->
  <text
    x="450" y="150"
    font-family="Helvetica, Arial, sans-serif"
    font-size="20"
    text-anchor="middle"
    fill="white"
    stroke="#888888"
    stroke-width="1.5"
    paint-order="stroke"
  >Artist / Musician</text>
</svg>
